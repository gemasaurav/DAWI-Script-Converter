
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAWI Script Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="assets/dawi-logo.png" alt="DAWI Logo" id="logo">

        <h1>DAWI Script Converter</h1>

        <p>Created & Designed by</p>

        <h2>100,000,000,000</h2>
    </div>

    <!-- Date Screen -->
    <div id="dateScreen" style="display:none;">

        <h2>Enter Coding Date</h2>

        <input
            type="text"
            id="codingDate"
            placeholder="DD/MM/YYYY"
            maxlength="10">

        <button id="nextBtn">✓</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
