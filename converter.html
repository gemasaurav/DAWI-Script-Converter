<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAWI Script Converter</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="converter">

    <h1>DAWI Script Converter</h1>

    <div class="text-container">

        <textarea
            id="inputText"
            placeholder="Enter English or DAWI Text Here"></textarea>

        <textarea
            id="outputText"
            placeholder="Converted / Decoded Text"
            readonly></textarea>

    </div>

    <div class="buttons">

        <button id="convertBtn">Convert</button>

        <button id="decodeBtn">Decode</button>

        <button id="copyBtn">Copy</button>

        <button id="clearBtn">Clear</button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
